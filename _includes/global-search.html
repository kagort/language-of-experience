<script>
var PHIL_DATA = [
  {% assign lec1 = "descartes,leibniz,spinoza,locke,berkeley,hume,kant,brentano,husserl,merleau_ponty,russell,sellars,wittgenstein,churchland,putnam,chalmers,barrett,friston" | split: "," %}
  {% for id in lec1 %}{% assign p = site.data.philosophers[id] %}
  { id: {{ id | jsonify }}, name: {{ p.name | jsonify }}, dates: {{ p.dates | jsonify }}, tradition: {{ p.tradition | jsonify }}, lecture: 1 },
  {% endfor %}
  {% assign lec2 = "justin_martyr,evagrius,mark_ascetic,diadochus,cassian,dorotheos,isaac_syrian,john_climacus,nikiphoros,nikitas_stithatos,theodore_studite,symeon_theologian,origen,macarius,nikodim,silouan,theophan,ignaty" | split: "," %}
  {% for id in lec2 %}{% assign p = site.data.philosophers[id] %}
  { id: {{ id | jsonify }}, name: {{ p.name | jsonify }}, dates: {{ p.dates | jsonify }}, tradition: {{ p.tradition | jsonify }}, lecture: 2 },
  {% endfor %}
];

(function() {
  var input   = document.getElementById('global-search');
  var results = document.getElementById('global-search-results');
  if (!input) return;

  input.addEventListener('input', function() {
    var q = input.value.trim().toLowerCase();
    results.innerHTML = '';
    if (!q) { results.hidden = true; return; }

    var matches = PHIL_DATA.filter(function(p) {
      return (p.name + ' ' + p.dates + ' ' + p.tradition).toLowerCase().indexOf(q) !== -1;
    });

    if (!matches.length) {
      results.innerHTML = '<li class="gsr-empty">Ничего не найдено</li>';
    } else {
      matches.forEach(function(p) {
        var base = '{{ "/" | relative_url }}'.replace(/\/$/, '');
        var href = base + '/philosopher/' + p.id + '/';
        var li = document.createElement('li');
        li.className = 'gsr-item';
        li.innerHTML = '<a href="' + href + '" class="gsr-link">'
          + '<span class="gsr-name">' + p.name + '</span>'
          + '<span class="gsr-meta">' + p.dates + ' · ' + p.tradition + ' · Лекция ' + p.lecture + '</span>'
          + '</a>';
        results.appendChild(li);
      });
    }
    results.hidden = false;
  });

  document.addEventListener('click', function(e) {
    if (!input.contains(e.target) && !results.contains(e.target)) {
      results.hidden = true;
    }
  });
})();
</script>
